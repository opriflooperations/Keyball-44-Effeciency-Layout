CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
CONFIG_BT_PERIPHERAL_PREF_LATENCY=16
CONFIG_BT_BUF_ACL_TX_COUNT=32
CONFIG_BT_L2CAP_TX_BUF_COUNT=32

# Set transmission power to max
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# Display Settings
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_EXT_POWER=y

# 1. Battery: Show percentage AND icon
# Note: In standard ZMK, setting this to 'y' often replaces the icon. 
# To see both on a split, we ensure proxying is on so the left side sees the right.
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# 2. Layer Status: Enable layer display
CONFIG_ZMK_WIDGET_LAYER_STATUS=y

# 3. Caps Lock & HID Indicators
# This requires recent ZMK firmware. If your build fails, remove this line.
CONFIG_ZMK_WIDGET_INDICATORS_STATUS=y

# 4. Peripheral (Right Side) Display
# This tells the right side to show its own status instead of just a logo.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
